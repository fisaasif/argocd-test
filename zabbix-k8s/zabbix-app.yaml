apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: zabbix
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/fisaasif/zabbix-gitops
    targetRevision: HEAD
    path: zabbix
    helm:
      valueFiles:
      - values.yaml
      chart: zabbix
      repoURL: https://zabbix-community.github.io/helm-zabbix

  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring

  syncPolicy:
    automated:
      prune: true
      selfHeal: true